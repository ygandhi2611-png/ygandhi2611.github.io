<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Portfolio Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f3f4ef;color:#231B18;min-height:100vh}
.topbar{background:#231B18;color:#FBFCF8;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar h1{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:800}
.topbar-right{display:flex;align-items:center;gap:1rem}
.topbar span{font-size:.75rem;opacity:.5}
.top-save{background:#FBFCF8;color:#231B18;border:none;border-radius:50px;padding:.5rem 1.4rem;font-size:.82rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:.2s}
.top-save:hover{background:#e8e4df}
.tabs{background:#231B18;border-top:1px solid rgba(251,252,248,.08);display:flex;gap:0;overflow-x:auto;padding:0 2rem}
.tab{color:rgba(251,252,248,.45);font-size:.75rem;font-weight:600;padding:.7rem 1.2rem;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.2s;letter-spacing:.03em}
.tab:hover{color:rgba(251,252,248,.8)}
.tab.active{color:#FBFCF8;border-bottom-color:#FBFCF8}
.container{max-width:800px;margin:2rem auto;padding:0 1.5rem 5rem}
.section{display:none}.section.active{display:block}
.card{background:#fff;border:1px solid #e2ddd8;border-radius:16px;padding:1.8rem;margin-bottom:1.2rem;box-shadow:0 2px 12px rgba(35,27,24,.05)}
.card-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:800;color:#231B18;margin-bottom:1.2rem;padding-bottom:.7rem;border-bottom:2px solid #f3f4ef;display:flex;align-items:center;justify-content:space-between}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.72rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#6b5f58;margin-bottom:.35rem}
.field input,.field textarea{width:100%;background:#f9f9f7;border:1.5px solid #e2ddd8;border-radius:10px;padding:.62rem .9rem;font-size:.86rem;font-family:'Inter',sans-serif;color:#231B18;outline:none;transition:border-color .2s}
.field input:focus,.field textarea:focus{border-color:#231B18}
.field textarea{resize:vertical;min-height:72px}
.field .hint{font-size:.69rem;color:#9b8f87;margin-top:.25rem}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.add-btn{background:rgba(35,27,24,.06);border:1.5px dashed #c8c2bc;border-radius:10px;padding:.7rem;width:100%;font-size:.82rem;font-weight:600;color:#6b5f58;cursor:pointer;font-family:'Inter',sans-serif;transition:.2s;margin-top:.5rem}
.add-btn:hover{background:rgba(35,27,24,.1);border-color:#231B18;color:#231B18}
.remove-btn{background:none;border:none;color:#c8c2bc;cursor:pointer;font-size:1rem;padding:.2rem .4rem;border-radius:6px;transition:.2s;font-family:'Inter',sans-serif}
.remove-btn:hover{color:#ef4444;background:#fef2f2}
.save-btn{width:100%;background:#231B18;color:#FBFCF8;border:none;border-radius:50px;padding:1rem;font-size:.92rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:.2s;margin-top:.5rem}
.save-btn:hover{background:#3d302b;transform:translateY(-1px)}
.preview-btn{display:inline-block;margin-top:1rem;color:#6b5f58;font-size:.8rem;text-decoration:none;font-weight:600;border:1.5px solid #e2ddd8;border-radius:50px;padding:.5rem 1.2rem;transition:.2s}
.preview-btn:hover{border-color:#231B18;color:#231B18}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:#231B18;color:#FBFCF8;padding:.8rem 2rem;border-radius:50px;font-size:.85rem;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.bullet-list{display:flex;flex-direction:column;gap:.4rem;margin-top:.4rem}
.bullet-row{display:flex;gap:.4rem;align-items:flex-start}
.bullet-row input{flex:1}
.tag-input-wrap{display:flex;flex-wrap:wrap;gap:.4rem;background:#f9f9f7;border:1.5px solid #e2ddd8;border-radius:10px;padding:.5rem .7rem;min-height:42px;cursor:text;transition:border-color .2s}
.tag-input-wrap:focus-within{border-color:#231B18}
.tag-chip{display:inline-flex;align-items:center;gap:.3rem;background:#231B18;color:#FBFCF8;font-size:.72rem;font-weight:600;padding:.25rem .7rem;border-radius:50px}
.tag-chip button{background:none;border:none;color:rgba(251,252,248,.6);cursor:pointer;font-size:.8rem;line-height:1;padding:0}
.tag-chip button:hover{color:#fff}
.tag-input-wrap input{border:none;background:none;outline:none;font-size:.82rem;font-family:'Inter',sans-serif;color:#231B18;min-width:80px;flex:1}
</style>
</head>
<body>

<div class="topbar">
  <h1>⚙️ Portfolio Admin</h1>
  <div class="topbar-right">
    <span>Changes saved locally</span>
    <button class="top-save" onclick="saveAll()">💾 Save</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('personal',this)">Personal</div>
  <div class="tab" onclick="switchTab('hero',this)">Hero</div>
  <div class="tab" onclick="switchTab('experience',this)">Experience</div>
  <div class="tab" onclick="switchTab('skills',this)">Skills</div>
  <div class="tab" onclick="switchTab('projects',this)">Projects</div>
  <div class="tab" onclick="switchTab('education',this)">Education</div>
  <div class="tab" onclick="switchTab('licenses',this)">Licenses</div>
</div>

<div class="container">

  <!-- PERSONAL -->
  <div class="section active" id="sec-personal">
    <div class="card">
      <div class="card-title">👤 Personal Info</div>
      <div class="field"><label>Full Name</label><input id="name" type="text" placeholder="Yash Gandhi"/></div>
      <div class="row2">
        <div class="field"><label>Email</label><input id="email" type="email" placeholder="you@email.com"/></div>
        <div class="field"><label>Phone</label><input id="phone" type="text" placeholder="+1 (240) 978-0794"/></div>
      </div>
      <div class="field"><label>LinkedIn URL</label><input id="linkedin" type="url" placeholder="https://linkedin.com/in/yourprofile"/></div>
      <div class="field"><label>Contact Section Subtext</label><input id="contactSub" type="text" placeholder="Actively seeking roles in..."/></div>
    </div>
    <div class="card">
      <div class="card-title">📊 Stats Strip</div>
      <div class="row2"><div class="field"><label>Stat 1 Number</label><input id="stat1n" placeholder="3+"/></div><div class="field"><label>Stat 1 Label</label><input id="stat1l" placeholder="Years Experience"/></div></div>
      <div class="row2"><div class="field"><label>Stat 2 Number</label><input id="stat2n" placeholder="6"/></div><div class="field"><label>Stat 2 Label</label><input id="stat2l" placeholder="Key Projects"/></div></div>
      <div class="row2"><div class="field"><label>Stat 3 Number</label><input id="stat3n" placeholder="30%"/></div><div class="field"><label>Stat 3 Label</label><input id="stat3l" placeholder="Review Cycle Reduction"/></div></div>
    </div>
  </div>

  <!-- HERO -->
  <div class="section" id="sec-hero">
    <div class="card">
      <div class="card-title">🏠 Hero Section</div>
      <div class="field"><label>Eyebrow</label><input id="eyebrow" placeholder="Regulatory Affairs & Quality Assurance"/></div>
      <div class="field"><label>Tagline</label><input id="tagline" placeholder="MS Regulatory Affairs · Northeastern University"/><div class="hint">Use &lt;br/&gt; for a line break</div></div>
      <div class="field"><label>Sub-tagline (keywords)</label><input id="sub" placeholder="FDA · EU MDR · ISO 13485 · cGMP"/></div>
    </div>
    <div class="card">
      <div class="card-title">💊 About Section</div>
      <div class="field"><label>About Title</label><input id="aboutTitle" placeholder="Where compliance, quality & execution meet."/></div>
      <div class="field"><label>Paragraph 1</label><textarea id="aboutP1"></textarea></div>
      <div class="field"><label>Paragraph 2</label><textarea id="aboutP2"></textarea></div>
      <div class="field"><label>Paragraph 3</label><textarea id="aboutP3"></textarea></div>
    </div>
  </div>

  <!-- EXPERIENCE -->
  <div class="section" id="sec-experience">
    <div id="exp-list"></div>
    <button class="add-btn" onclick="addExp()">+ Add Experience</button>
  </div>

  <!-- SKILLS -->
  <div class="section" id="sec-skills">
    <div id="skills-list"></div>
    <button class="add-btn" onclick="addSkillCat()">+ Add Skill Category</button>
  </div>

  <!-- PROJECTS -->
  <div class="section" id="sec-projects">
    <div id="proj-list"></div>
    <button class="add-btn" onclick="addProj()">+ Add Project</button>
  </div>

  <!-- EDUCATION -->
  <div class="section" id="sec-education">
    <div id="edu-list"></div>
    <button class="add-btn" onclick="addEdu()">+ Add Education</button>
  </div>

  <!-- LICENSES -->
  <div class="section" id="sec-licenses">
    <div id="lic-list"></div>
    <button class="add-btn" onclick="addLic()">+ Add License / Certification</button>
  </div>

  <br/>
  <button class="save-btn" onclick="saveAll()">💾 Save All Changes</button>
  <br/>
  <a href="index.html" class="preview-btn" target="_blank">👁 Preview Portfolio →</a>
</div>

<div class="toast" id="toast">✓ Saved!</div>

let data={};

function load(){
  const saved=localStorage.getItem('portfolio_data');
  data=JSON.parse(JSON.stringify(DEFAULTS));
  if(saved){
    try{
      const s=JSON.parse(saved);
      ['name','email','phone','linkedin','contactSub','eyebrow','tagline','sub',
       'aboutTitle','aboutP1','aboutP2','aboutP3',
       'stat1n','stat1l','stat2n','stat2l','stat3n','stat3l'].forEach(f=>{if(s[f]!==undefined)data[f]=s[f];});
      if(s.experience&&s.experience.length)data.experience=s.experience;
      if(s.skills&&s.skills.length)data.skills=s.skills;
      if(s.projects&&s.projects.length)data.projects=s.projects;
      if(s.education&&s.education.length)data.education=s.education;
      if(s.licenses&&s.licenses.length)data.licenses=s.licenses;
    }catch(e){}
  }
  ['name','email','phone','linkedin','contactSub','eyebrow','tagline','sub',
   'aboutTitle','aboutP1','aboutP2','aboutP3',
   'stat1n','stat1l','stat2n','stat2l','stat3n','stat3l'].forEach(f=>{
    const el=document.getElementById(f);if(el)el.value=data[f]||'';
  });
  renderExp();renderSkills();renderProj();renderEdu();renderLic();
}

function switchTab(name,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  el.classList.add('active');
}

function renderExp(){

      <div class="card-title"><span>💼 ${e.company||'New Experience'}</span><button class="remove-btn" onclick="removeExp(${i})">🗑</button></div>

        <div class="field"><label>Company</label><input value="${e.company||''}" onchange="data.experience[${i}].company=this.value"/></div>

      </div>
      <div class="row2">
        <div class="field"><label>Job Title</label><input value="${e.role||''}" onchange="data.experience[${i}].role=this.value"/></div>
        <div class="field"><label>Date Range</label><input value="${e.date||''}" onchange="data.experience[${i}].date=this.value"/></div>
      </div>
      <div class="field"><label>Subtitle / Domain</label><input value="${e.place||''}" onchange="data.experience[${i}].place=this.value"/></div>
      <div class="field">
        <label>Bullet Points</label>
        <div class="bullet-list" id="bullets-${i}">
          ${(e.bullets||[]).map((b,j)=>`<div class="bullet-row"><input value="${b.replace(/"/g,'&quot;')}" onchange="data.experience[${i}].bullets[${j}]=this.value"/><button class="remove-btn" onclick="removeBullet(${i},${j})">✕</button></div>`).join('')}
        </div>
        <button class="add-btn" style="margin-top:.4rem" onclick="addBullet(${i})">+ Add Bullet</button>
      </div>`;
    list.appendChild(card);
  });
}
function addExp(){data.experience.push({company:'New Company',location:'',role:'',date:'',place:'',bullets:['']});renderExp();}
function removeExp(i){data.experience.splice(i,1);renderExp();}
function addBullet(i){data.experience[i].bullets.push('');renderExp();}
function removeBullet(i,j){data.experience[i].bullets.splice(j,1);renderExp();}

function renderSkills(){
  const list=document.getElementById('skills-list');list.innerHTML='';
  (data.skills||[]).forEach((s,i)=>{
    const card=document.createElement('div');card.className='card';
    card.innerHTML=`
      <div class="card-title"><span>🏷 ${s.category||'New Category'}</span><button class="remove-btn" onclick="removeSkillCat(${i})">🗑</button></div>
      <div class="field"><label>Category Name</label><input value="${s.category||''}" onchange="data.skills[${i}].category=this.value"/></div>
      <div class="field">
        <label>Tags <span style="text-transform:none;font-weight:400;color:#9b8f87">(type and press Enter)</span></label>
        <div class="tag-input-wrap" id="tags-wrap-${i}">
          ${(s.tags||[]).map((t,j)=>`<span class="tag-chip">${t}<button onclick="removeTag(${i},${j})">✕</button></span>`).join('')}
          <input placeholder="Add tag..." onkeydown="handleTagInput(event,${i})"/>
        </div>
      </div>`;
    list.appendChild(card);
  });
}
function addSkillCat(){data.skills.push({category:'New Category',tags:[]});renderSkills();}
function removeSkillCat(i){data.skills.splice(i,1);renderSkills();}
function removeTag(i,j){data.skills[i].tags.splice(j,1);renderSkills();}
function handleTagInput(e,i){if(e.key==='Enter'||e.key===','){e.preventDefault();const val=e.target.value.trim().replace(/,$/,'');if(val){data.skills[i].tags.push(val);renderSkills();}}}

function saveAll(){
  ['name','email','phone','linkedin','contactSub','eyebrow','tagline','sub',
   'aboutTitle','aboutP1','aboutP2','aboutP3',
   'stat1n','stat1l','stat2n','stat2l','stat3n','stat3l'].forEach(f=>{
